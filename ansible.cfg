[defaults]
inventory = inventory/production/hosts.ini
host_key_checking = False
forks = 20
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible-facts
fact_caching_timeout = 86400
stdout_callback = yaml
callback_whitelist = profile_tasks, timer, mail
bin_ansible_callbacks = True
retry_files_enabled = True
retry_files_save_path = /tmp/ansible-retry
roles_path = roles
collections_path = collections
ansible_managed = Ansible managed: {file} modified on %Y-%m-%d %H:%M:%S
inventory_ignore_extensions = ~, .orig, .bak, .swp, .pyc, .pyo, .retry
display_skipped_hosts = False
internal_poll_interval = 0.001
system_warnings = False
deprecation_warnings = False
nocows = 1
interpreter_python = /usr/bin/python3

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=3
pipelining = True
control_path = /tmp/ansible-%%h-%%p-%%r
scp_if_ssh = True
transfer_method = pipelined
pipelining = True

[inventory]
enable_plugins = host_list, script, auto, yaml, ini, toml

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[galaxy]
server_list = ansible_galaxy

[galaxy_server.ansible_galaxy]
url = https://galaxy.ansible.com