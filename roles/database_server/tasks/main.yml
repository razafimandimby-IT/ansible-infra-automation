---
# Database Server role — PostgreSQL deployment with replication

- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - "postgresql-{{ db_version }}"
      - "postgresql-client-{{ db_version }}"
      - "postgresql-contrib-{{ db_version }}"
      - "postgresql-{{ db_version }}-repack"
      - "postgresql-{{ db_version }}-pgbackrest"
      - postgresql-common
      - libpq-dev
      - python3-psycopg2
      - pgbouncer
      - pgadmin4
    state: present
    update_cache: yes
  when: db_type == "postgresql"

- name: Install tools for performance monitoring
  ansible.builtin.apt:
    name:
      - postgresql-{{ db_version }}-pgstatstatements
      - postgresql-{{ db_version }}-pgbadger
      - barman
      - barman-cli
    state: present
  when: db_type == "postgresql"

- name: Ensure PostgreSQL is running
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Configure PostgreSQL main configuration
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ db_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0644"
  notify: restart postgresql

- name: Configure PostgreSQL client authentication
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ db_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: restart postgresql

- name: Configure PostgreSQL ident map
  ansible.builtin.copy:
    content: |
      # PostgreSQL User Name Maps
      # Map system users to database users
      # /etc/postgresql/{{ db_version }}/main/pg_ident.conf
    dest: "/etc/postgresql/{{ db_version }}/main/pg_ident.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: restart postgresql

- name: Create application databases
  ansible.builtin.postgresql_db:
    name: "{{ item.name }}"
    owner: "{{ item.owner }}"
    encoding: "{{ item.encoding | default('UTF-8') }}"
    lc_collate: "{{ item.locale | default('en_US.UTF-8') }}"
    lc_ctype: "{{ item.locale | default('en_US.UTF-8') }}"
    state: present
  become: yes
  become_user: postgres
  loop: "{{ db_databases }}"
  no_log: yes

- name: Create application database users
  ansible.builtin.postgresql_user:
    name: "{{ item.owner }}"
    password: "{{ db_app_password | default('changeme') }}"
    role_attr_flags: "CREATEDB,NOSUPERUSER"
    state: present
  become: yes
  become_user: postgres
  loop: "{{ db_databases }}"
  no_log: yes

- name: Configure replication user
  ansible.builtin.postgresql_user:
    name: "{{ db_replication.user }}"
    password: "{{ db_replication_password | default('repl_pass') }}"
    role_attr_flags: "REPLICATION,LOGIN"
    state: present
  become: yes
  become_user: postgres
  when: db_replication.enabled
  no_log: yes

- name: Create directories for WAL archiving
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: postgres
    group: postgres
    mode: "0700"
  loop:
    - /var/lib/postgresql/{{ db_version }}/archive
    - /var/lib/postgresql/{{ db_version }}/backups
  when: db_replication.enabled

- name: Install and configure PgBouncer connection pooling
  ansible.builtin.template:
    src: pgbouncer.ini.j2
    dest: /etc/pgbouncer/pgbouncer.ini
    owner: postgres
    group: postgres
    mode: "0640"
  notify: restart pgbouncer

- name: Configure log rotation for PostgreSQL logs
  ansible.builtin.copy:
    content: |
      /var/log/postgresql/postgresql-{{ db_version }}-main.log {
          weekly
          rotate 12
          compress
          delaycompress
          missingok
          notifempty
          create 640 postgres adm
          postrotate
              if [ -f /var/run/postgresql/{{ db_version }}-main.pid ]; then
                  kill -HUP $(cat /var/run/postgresql/{{ db_version }}-main.pid)
              fi
          endscript
      }
    dest: /etc/logrotate.d/postgresql-common
    owner: root
    group: root
    mode: "0644"

- name: Configure UFW for PostgreSQL
  ansible.builtin.ufw:
    rule: allow
    port: "{{ db_port }}"
    proto: tcp
    from_ip: "{{ item }}"
  loop:
    - "192.168.20.0/24"
    - "192.168.30.0/24"
    - "192.168.40.0/24"

- name: Set PostgreSQL kernel shared memory parameters
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
  loop:
    - { name: "kernel.shmmax", value: "{{ (db_shared_buffers | human_to_bytes * 2) | string }}" }
    - { name: "kernel.shmall", value: "{{ (db_shared_buffers | human_to_bytes * 2 / 4096) | int | string }}" }
    - { name: "kernel.sem", value: "250 512000 100 2048" }
    - { name: "vm.dirty_background_ratio", value: "5" }
    - { name: "vm.dirty_ratio", value: "30" }
    - { name: "vm.swappiness", value: "10" }