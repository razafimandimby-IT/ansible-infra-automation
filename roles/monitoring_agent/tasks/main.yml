---
# Monitoring Agent role — Zabbix, Prometheus, Log shipping

- name: Install Zabbix repository
  ansible.builtin.get_url:
    url: "https://repo.zabbix.com/zabbix/{{ zabbix_version }}/{{ ansible_distribution | lower }}/pool/main/z/zabbix-release/zabbix-release_{{ zabbix_version }}-{{ ansible_distribution_version }}_all.deb"
    dest: /tmp/zabbix-release.deb
  when: ansible_facts.os_family == "Debian"
  register: zabbix_repo_download
  tags: [zabbix]

- name: Install Zabbix release package
  ansible.builtin.apt:
    deb: /tmp/zabbix-release.deb
  when: zabbix_repo_download.changed
  tags: [zabbix]

- name: Update APT cache after Zabbix repo install
  ansible.builtin.apt:
    update_cache: yes
  when: zabbix_repo_download.changed
  tags: [zabbix]

- name: Install Zabbix agent 2
  ansible.builtin.apt:
    name: "{{ zabbix_agent_package }}"
    state: present
  tags: [zabbix]

- name: Configure Zabbix agent
  ansible.builtin.lineinfile:
    path: /etc/zabbix/zabbix_agent2.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^Server=", line: "Server={{ zabbix_server }}" }
    - { regexp: "^ServerActive=", line: "ServerActive={{ zabbix_server }}" }
    - { regexp: "^Hostname=", line: "Hostname={{ ansible_fqdn }}" }
    - { regexp: "^ListenPort=", line: "ListenPort={{ zabbix_agent_port }}" }
    - { regexp: "^Timeout=", line: "Timeout={{ zabbix_agent_timeout }}" }
    - { regexp: "^LogLevel=", line: "LogLevel={{ zabbix_agent_log_level }}" }
    - { regexp: "^BufferSend=", line: "BufferSend={{ zabbix_agent_buffer_send }}" }
    - { regexp: "^BufferSize=", line: "BufferSize={{ zabbix_agent_buffer_size }}" }
  notify: restart zabbix-agent
  tags: [zabbix]

- name: Configure Zabbix TLS settings
  ansible.builtin.lineinfile:
    path: /etc/zabbix/zabbix_agent2.conf
    regexp: "^{{ item.param }}"
    line: "{{ item.param }}={{ item.value }}"
    create: no
  loop:
    - { param: "TLSConnect", value: "{{ 'psk' if zabbix_tls_enabled else 'unencrypted' }}" }
    - { param: "TLSAccept", value: "{{ zabbix_tls_accept }}" }
    - { param: "TLSPSKIdentity", value: "{{ ansible_fqdn }}" }
    - { param: "TLSPSKFile", value: "/etc/zabbix/zabbix_agent2.psk" }
  when: zabbix_tls_enabled | default(false)
  notify: restart zabbix-agent
  tags: [zabbix]

- name: Generate Zabbix PSK key if TLS enabled
  ansible.builtin.command:
    cmd: "openssl rand -hex 32 | tee /etc/zabbix/zabbix_agent2.psk"
    creates: /etc/zabbix/zabbix_agent2.psk
  when: zabbix_tls_enabled | default(false)
  tags: [zabbix]

- name: Set Zabbix PSK file permissions
  ansible.builtin.file:
    path: /etc/zabbix/zabbix_agent2.psk
    owner: zabbix
    group: zabbix
    mode: "0400"
  when: zabbix_tls_enabled | default(false)
  tags: [zabbix]

- name: Enable and start Zabbix agent
  ansible.builtin.systemd:
    name: "{{ zabbix_agent_service }}"
    state: started
    enabled: yes
  tags: [zabbix]

- name: Download Prometheus node_exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ prometheus_node_exporter_version }}/node_exporter-{{ prometheus_node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz
  register: prom_download
  tags: [prometheus]

- name: Extract Prometheus node_exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /opt
    remote_src: yes
    owner: root
    group: root
    creates: "/opt/node_exporter-{{ prometheus_node_exporter_version }}.linux-amd64/node_exporter"
  when: prom_download.changed
  tags: [prometheus]

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/opt/node_exporter-{{ prometheus_node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: root
    group: root
    mode: "0755"
    remote_src: yes
  when: prom_download.changed
  tags: [prometheus]

- name: Create node_exporter systemd service
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Prometheus Node Exporter
      After=network.target

      [Service]
      Type=simple
      User=nobody
      Group=nogroup
      ExecStart=/usr/local/bin/node_exporter \
        --web.listen-address=:{{ prometheus_node_exporter_port }} \
        --path.rootfs=/ \
        {% for collector in prometheus_node_exporter_enabled_collectors %}
        --collector.{{ collector }} \
        {% endfor %}
        --no-collector.wifi \
        --no-collector.zfs \
        --collector.textfile.directory=/var/lib/node_exporter/textfile

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/prometheus-node-exporter.service
    owner: root
    group: root
    mode: "0644"
  when: prom_download.changed
  tags: [prometheus]

- name: Create textfile collector directory
  ansible.builtin.file:
    path: /var/lib/node_exporter/textfile
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [prometheus]

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes
  when: prom_download.changed
  tags: [prometheus]

- name: Enable and start Prometheus node_exporter
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: yes
  tags: [prometheus]

- name: Install rsyslog for log shipping
  ansible.builtin.apt:
    name: rsyslog
    state: present
  tags: [logging]

- name: Configure rsyslog remote forwarding
  ansible.builtin.lineinfile:
    path: /etc/rsyslog.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^(#)?\\*\\..*@@", line: "*.* @@{{ logstash_server }}:{{ logstash_port }};RSYSLOG_SyslogProtocol23Format" }
  notify: restart rsyslog
  tags: [logging]

- name: Create log shipping TLS directory
  ansible.builtin.file:
    path: /etc/rsyslog.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [logging]

- name: Deploy rsyslog TLS certificate if needed
  ansible.builtin.copy:
    src: /etc/ssl/certs/{{ ansible_fqdn }}.crt
    dest: /etc/rsyslog.d/client.crt
    owner: root
    group: root
    mode: "0644"
  when: logstash_ssl_enabled | default(false)
  ignore_errors: yes
  tags: [logging]

- name: Configure rsyslog TLS forwarding
  ansible.builtin.copy:
    content: |
      # Ansible managed: Rsyslog TLS forwarding to {{ logstash_server }}
      $DefaultNetstreamDriverCAFile /etc/rsyslog.d/client.crt
      $ActionSendStreamDriver gtls
      $ActionSendStreamDriverMode 1
      $ActionSendStreamDriverAuthMode x509/name
      *.* @@{{ logstash_server }}:{{ logstash_port }}
    dest: /etc/rsyslog.d/remote-logging.conf
    owner: root
    group: root
    mode: "0644"
  when: logstash_ssl_enabled | default(false)
  notify: restart rsyslog
  tags: [logging]

- name: Configure log shipping without TLS
  ansible.builtin.copy:
    content: |
      # Ansible managed: Rsyslog forwarding to {{ logstash_server }}
      *.* @@{{ logstash_server }}:{{ logstash_port }}
    dest: /etc/rsyslog.d/remote-logging.conf
    owner: root
    group: root
    mode: "0644"
  when: not (logstash_ssl_enabled | default(false))
  notify: restart rsyslog
  tags: [logging]

- name: Clean up temporary files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/zabbix-release.deb
    - /tmp/node_exporter.tar.gz
  tags: [cleanup]