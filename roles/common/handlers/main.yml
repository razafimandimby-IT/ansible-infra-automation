---
- name: restart chrony
  ansible.builtin.systemd:
    name: chronyd
    state: restarted

- name: restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted

- name: restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted