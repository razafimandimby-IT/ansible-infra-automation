---
- name: restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: restart auditd
  ansible.builtin.command:
    cmd: service auditd restart
  changed_when: false
  ignore_errors: yes

- name: reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: false

- name: restart ufw
  ansible.builtin.systemd:
    name: ufw
    state: restarted

- name: update grub
  ansible.builtin.command:
    cmd: update-grub
  changed_when: false