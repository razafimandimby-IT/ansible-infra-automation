# ============================================================
# Staging Inventory — Ansible Infrastructure Automation
# ============================================================
# Environment: Staging / Testing
# Domain: staging.example.internal
# Network: 10.0.0.0/16
# ============================================================

[domain_controllers]
dc-stg01.staging.example.internal   ansible_host=10.0.10.10   ansible_user=ansible-admin

[web_servers]
web-stg01.staging.example.internal  ansible_host=10.0.20.10   ansible_user=ansible-admin
web-stg02.staging.example.internal  ansible_host=10.0.20.11   ansible_user=ansible-admin

[database_servers]
db-stg01.staging.example.internal   ansible_host=10.0.30.10   ansible_user=ansible-admin

[monitoring]
mon-stg01.staging.example.internal  ansible_host=10.0.40.10   ansible_user=ansible-admin

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_become=true
ansible_become_method=sudo
ansible_become_user=root
domain_name: "staging.example.internal"
env_type: "staging"