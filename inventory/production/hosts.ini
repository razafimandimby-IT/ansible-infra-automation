# ============================================================
# Production Inventory — Ansible Infrastructure Automation
# ============================================================
# Environment: Production
# Domain: example.internal
# Network: 192.168.0.0/16
# ============================================================

[domain_controllers]
dc01.example.internal     ansible_host=192.168.10.10     ansible_user=ansible-admin
dc02.example.internal     ansible_host=192.168.10.11     ansible_user=ansible-admin

[web_servers]
web01.example.internal    ansible_host=192.168.20.10     ansible_user=ansible-admin    http_port=80    https_port=443
web02.example.internal    ansible_host=192.168.20.11     ansible_user=ansible-admin    http_port=80    https_port=443
web03.example.internal    ansible_host=192.168.20.12     ansible_user=ansible-admin    http_port=8080  https_port=8443

[database_servers]
db01-primary.example.internal   ansible_host=192.168.30.10   ansible_user=ansible-admin    pg_port=5432
db02-standby.example.internal   ansible_host=192.168.30.11   ansible_user=ansible-admin    pg_port=5432

[monitoring]
monitor01.example.internal      ansible_host=192.168.40.10   ansible_user=ansible-admin

[backup_servers]
backup01.example.internal       ansible_host=192.168.50.10   ansible_user=ansible-admin

[loadbalancers]
lb01.example.internal           ansible_host=192.168.60.10   ansible_user=ansible-admin

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_become=true
ansible_become_method=sudo
ansible_become_user=root
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new
ansible_ssh_retries=3
ansible_connection=ssh
ansible_port=22